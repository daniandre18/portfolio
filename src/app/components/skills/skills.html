<div class="sec-head">
  <span class="sec-num">// 02</span>
  <span class="sec-title">{{ title() }}</span>
  <div class="sec-rule"></div>
</div>

<p class="belt-note" [innerHTML]="beltNote()"></p>

<div class="skill-filters">
  @for (f of filterOptions(); track f.id) {
    <button class="filter-pill" [class.active]="activeFilter() === f.id" (click)="setFilter(f.id)">
      {{ f.label }} <span class="filter-count">{{ f.count }}</span>
    </button>
  }
</div>

<ng-template #cardTpl let-skill="skill">
  <div class="skill-card" tabindex="0">
    <span class="skill-logo-big">
      <img [src]="skill.logo" [alt]="skill.name" />
    </span>
    <div class="skill-belt-bar" [style.background]="skill.beltColor">
      <div class="stripes">
        @for (s of skill.stripes; track $index) {
          <span class="stripe"></span>
        }
      </div>
    </div>

    <div class="skill-tooltip">
      <div class="tooltip-name">{{ skill.name }}</div>
      <div class="tooltip-row">
        <span class="tooltip-belt" [style.background]="skill.beltColor" [style.color]="skill.beltTextOn">
          {{ skill.beltLabel }}
        </span>
        <span class="tooltip-years">{{ skill.years }}</span>
      </div>
    </div>
  </div>
</ng-template>

@if (isAll()) {
  <div class="marquee-row">
    <button class="marquee-btn" (click)="nudge(-1)" aria-label="Anterior">‹</button>
    <div class="marquee"
         [class.dragging]="isDragging()"
         (mouseenter)="setPaused(true)"
         (mouseleave)="setPaused(false)"
         (pointerdown)="onPointerDown($event)"
         (pointermove)="onPointerMove($event)"
         (pointerup)="onPointerUp($event)"
         (pointercancel)="onPointerUp($event)">
      <div class="marquee-track" #track>
        @for (skill of allDoubled(); track $index) {
          <ng-container [ngTemplateOutlet]="cardTpl" [ngTemplateOutletContext]="{ skill }"></ng-container>
        }
      </div>
    </div>
    <button class="marquee-btn" (click)="nudge(1)" aria-label="Siguiente">›</button>
  </div>
} @else {
  <div class="skill-grid">
    @for (skill of visibleItems(); track skill.name) {
      <ng-container [ngTemplateOutlet]="cardTpl" [ngTemplateOutletContext]="{ skill }"></ng-container>
    }
  </div>
}
