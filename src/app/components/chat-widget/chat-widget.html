<div class="chat-widget">
  @if (open()) {
    <div class="chat-card">
      <div class="chat-card-head">
        <span class="chat-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v3"/>
            <circle cx="12" cy="2.4" r="1" fill="currentColor" stroke="none"/>
            <rect x="4" y="6.5" width="16" height="11.5" rx="4"/>
            <polygon points="8,18 6.5,22 10.5,18" fill="currentColor" stroke="none"/>
            <circle cx="9" cy="12" r="1.1" fill="currentColor" stroke="none"/>
            <circle cx="15" cy="12" r="1.1" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <div class="chat-id">
          <div class="chat-name">{{ name() }}</div>
          <div class="chat-role">{{ role() }}</div>
        </div>
        <button class="chat-close" (click)="toggle()" aria-label="Cerrar">✕</button>
      </div>
      <p class="chat-bubble">{{ greeting() }}</p>
      <a class="chat-cta" [href]="whatsappUrl()" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2c-5.52 0-10 4.48-10 10 0 1.77.46 3.45 1.27 4.9L2 22l5.25-1.38a9.96 9.96 0 0 0 4.79 1.22h.01c5.52 0 10-4.48 10-10s-4.49-9.84-10.01-9.84zm0 18.15a8.1 8.1 0 0 1-4.14-1.13l-.3-.18-3.11.82.83-3.03-.2-.31a8.13 8.13 0 0 1-1.25-4.32c0-4.49 3.66-8.15 8.16-8.15 4.49 0 8.14 3.65 8.14 8.15 0 4.49-3.65 8.15-8.13 8.15zm4.47-6.1c-.24-.12-1.44-.71-1.67-.79-.22-.08-.38-.12-.55.12-.16.24-.63.79-.77.95-.14.16-.28.18-.53.06-.24-.12-1.02-.38-1.94-1.2-.72-.64-1.2-1.43-1.35-1.67-.14-.24-.02-.37.11-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.55-1.33-.76-1.82-.2-.48-.4-.42-.55-.42-.14 0-.3-.02-.46-.02s-.42.06-.64.3c-.22.24-.85.83-.85 2.02 0 1.19.87 2.34.99 2.5.12.16 1.71 2.62 4.15 3.67.58.25 1.03.4 1.38.51.58.18 1.11.16 1.53.1.47-.07 1.44-.59 1.64-1.16.2-.57.2-1.06.14-1.16-.06-.1-.22-.16-.46-.28z"/></svg>
        <span>{{ cta() }}</span>
      </a>
    </div>
  }

  <button
    class="chat-fab"
    [class.open]="open()"
    (click)="toggle()"
    [attr.aria-label]="toggleLabel()"
    [attr.aria-expanded]="open()"
  >
    @if (open()) {
      <span class="chat-fab-icon close">✕</span>
    } @else {
      <span class="chat-fab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v3"/>
          <circle cx="12" cy="2.4" r="1" fill="currentColor" stroke="none"/>
          <rect x="4" y="6.5" width="16" height="11.5" rx="4"/>
          <polygon points="8,18 6.5,22 10.5,18" fill="currentColor" stroke="none"/>
          <circle cx="9" cy="12" r="1.1" fill="currentColor" stroke="none"/>
          <circle cx="15" cy="12" r="1.1" fill="currentColor" stroke="none"/>
        </svg>
      </span>
    }
  </button>
</div>
